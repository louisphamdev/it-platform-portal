# IT Platform Portal - Docker Compose
#
# This is the main entry point that combines base config with environment overrides.
# Usage:
#   UAT:        docker-compose -f docker-compose.yml -f docker-compose.uat.yml up
#   Staging:    docker-compose -f docker-compose.yml -f docker-compose.staging.yml up
#   Production: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# For local development without environment selection, use docker-compose.dev.yml (if available)

version: '3.9'

# This file intentionally left minimal - actual configuration is in docker-compose.base.yml
# which contains all services. Environment-specific overrides are in docker-compose.{env}.yml

services:
  # All services are defined in docker-compose.base.yml
  # Include base first, then environment-specific overrides
  
# Import base configuration
import:
  - path: docker-compose.base.yml
    required: false
