name: Deploy UAT

on:
  push:
    branches: [main]

concurrency:
  group: deploy-uat-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: it-platform-portal
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=uat-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./src/portal-shell
          file: ./src/portal-shell/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasec/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.meta.outputs.version }}"
          format: sarif
          output: trivy-uat.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-uat.sarif

      - name: Push image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./src/portal-shell
          file: ./src/portal-shell/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to UAT
    needs: build
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Deploy (placeholder)
        run: |
          echo "Would deploy ${{ needs.build.outputs.image-tag }} to UAT"
          echo "IMAGE_TAG=${{ needs.build.outputs.image-tag }}" >> $GITHUB_ENV
