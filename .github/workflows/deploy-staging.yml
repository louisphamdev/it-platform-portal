name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker
        run: |
          mkdir -p ~/.docker
          echo '{"experimental": true, "debug": true}' > ~/.docker/daemon.json || true
          docker version

      - name: Login to GHCR
        run: |
          echo "GITHUB_ACTOR: $GITHUB_ACTOR"
          echo "GITHUB_TOKEN available: ${{ secrets.GITHUB_TOKEN }}"
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          echo "Building with Dockerfile:"
          cat ./Dockerfile
          docker build --file ./Dockerfile --tag ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }}
          docker push ghcr.io/louisphamdev/it-platform-portal:staging-latest || true

      - name: Create Promotion Issue
        if: success()
        run: |
          echo "Staging deployed successfully with image: ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }}"
