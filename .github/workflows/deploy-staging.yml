name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: it-platform-portal
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== src/ ==="
          ls src/ 2>/dev/null || echo "No src/"
          echo "=== Dockerfile ==="
          cat Dockerfile 2>/dev/null || echo "No Dockerfile at root"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=staging-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug docker
        run: |
          echo "=== Docker version ==="
          docker --version 2>&1 || echo "No docker"
          echo "=== Buildx version ==="
          docker buildx version 2>&1 || echo "No buildx"
          echo "=== Docker info ==="
          docker info 2>&1 | head -10 || echo "Docker info failed"

      - name: Build image
        run: |
          set -x
          docker buildx build \
            --progress=plain \
            --output=type=local,dest=/tmp/build-output \
            --file ./Dockerfile \
            --tag ghcr.io/louisphamdev/it-platform-portal:staging-test \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            . 2>&1

      - name: Show build output
        run: |
          echo "=== Build output ==="
          ls -laR /tmp/build-output/ 2>/dev/null || echo "No output dir"

      - name: Push image
        if: success()
        run: |
          docker buildx build \
            --output=type=image,push=true \
            --file ./Dockerfile \
            --tag ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy
        run: |
          echo "Would deploy ${{ needs.build.outputs.image-tag }} to staging"
          echo "IMAGE_TAG=${{ needs.build.outputs.image-tag }}" >> $GITHUB_ENV

      - name: Create Promotion Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Production Promotion Ready - Staging Deployed',
              body: 'Staging deployed successfully. Ready for production release.',
              labels: ['promotion-ready']
            })
