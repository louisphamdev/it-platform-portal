name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: it-platform-portal
  REGISTRY: ghcr.io
  IMAGE_TAG: ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy
        run: |
          echo "Would deploy ${{ needs.build.outputs.image-tag }} to staging"
          echo "IMAGE_TAG=${{ needs.build.outputs.image-tag }}" >> $GITHUB_ENV

      - name: Create Promotion Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Production Promotion Ready - Staging Deployed',
              body: 'Staging deployed successfully. Ready for production release.',
              labels: ['promotion-ready']
            })
