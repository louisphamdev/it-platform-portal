name: Deploy to Staging

on:
  push:
    branches:
      - staging

env:
  ENVIRONMENT: staging
  DEPLOY_URL: staging.it-platform.internal
  POSTGRES_DB: postgres-staging
  POSTGRES_DB_NAME: itportal_staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Staging environment
        run: |
          echo "STAGING_DEPLOY=true" >> $GITHUB_ENV
          echo "POSTGRES_USER=staging_postgres" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Staging images
        run: |
          docker-compose -f docker-compose.base.yml -f docker-compose.staging.yml build
          docker-compose -f docker-compose.base.yml -f docker-compose.staging.yml push

      - name: Deploy to Staging
        run: |
          # SSH to Staging server and pull/deploy
          ssh ${{ secrets.STAGING_DEPLOY_USER }}@${{ env.DEPLOY_URL }} \
            "cd /opt/it-platform && \
             docker-compose -f docker-compose.base.yml -f docker-compose.staging.yml pull && \
             docker-compose -f docker-compose.base.yml -f docker-compose.staging.yml up -d && \
             docker system prune -f"

      - name: Verify Staging deployment
        run: |
          curl -f https://${{ env.DEPLOY_URL }}/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging Deployment completed - ${{ github.sha }} - ${{ github.actor }}"
