name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show current directory
        run: |
          echo "PWD: $(pwd)"
          echo "Files: $(ls -la)"
          echo "Dockerfiles: $(find . -name 'Dockerfile' -type f)"

      - name: Test docker build
        run: |
          echo "=== Testing docker build ==="
          docker build --version
          docker buildx version
          # Just do a simple test build first
          docker build -t test:1 .

      - name: Build and push portal
        run: |
          echo "=== Building portal ==="
          docker buildx build \
            --platform linux/amd64 \
            --output=type=image,push=true \
            --tag ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file ./Dockerfile \
            .

  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy
        run: |
          echo "Would deploy ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }} to staging"
