name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker
        run: |
          mkdir -p ~/.docker
          echo '{}' > ~/.docker/config.json 2>/dev/null || true

      - name: Login to GHCR
        run: |
          echo "Logging into GHCR..."
          docker login ghcr.io -u ${{ github.actor }} -p "${{ secrets.GITHUB_TOKEN }}" 2>&1
          echo "Login completed"

      - name: Debug Dockerfile
        run: |
          echo "=== Dockerfile ==="
          cat ./Dockerfile
          echo "=== File size ==="
          wc -l ./Dockerfile

      - name: Build
        run: |
          echo "=== Starting build ==="
          set -x
          docker build --file ./Dockerfile --tag ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }} . 2>&1

      - name: Push
        run: |
          echo "=== Starting push ==="
          set -x
          docker push ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }} 2>&1
