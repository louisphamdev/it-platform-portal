name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-docker:
    name: Test Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker info
        run: |
          echo "=== Docker info ==="
          docker info 2>&1 | head -20
          echo "=== Docker version ==="
          docker --version
          echo "=== Check Dockerfile ==="
          cat ./Dockerfile

  build-and-deploy:
    name: Build & Deploy
    needs: test-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/louisphamdev/it-platform-portal:staging-${{ github.sha }}
            ghcr.io/louisphamdev/it-platform-portal:staging-latest

      - name: Create Promotion Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Production Promotion Ready - Staging Deployed',
              body: 'Staging deployed successfully. Ready for production release.',
              labels: ['promotion-ready']
            })
