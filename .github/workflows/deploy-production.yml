name: Deploy to Production

on:
  push:
    tags:
      - 'release/v*'

env:
  ENVIRONMENT: production
  DEPLOY_URL: it-platform.internal
  POSTGRES_DB: postgres-prod
  POSTGRES_DB_NAME: itportal_prod

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Production environment
        run: |
          echo "PROD_DEPLOY=true" >> $GITHUB_ENV
          echo "POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and tag Production images
        run: |
          docker-compose -f docker-compose.base.yml -f docker-compose.prod.yml build
          docker-compose -f docker-compose.base.yml -f docker-compose.prod.yml tag it-platform-portal:latest ${{ vars.REGISTRY_URL }}/it-platform-portal:${{ steps.version.outputs.VERSION }}

      - name: Push Production images
        run: |
          docker push ${{ vars.REGISTRY_URL }}/it-platform-portal:${{ steps.version.outputs.VERSION }}

      - name: Deploy to Production (Manual)
        if: github.event_name == 'push'
        run: |
          echo "Production deployment requires manual approval"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Commit: ${{ github.sha }}"
          echo "Navigate to GitHub Actions → Production Deploy → Approve deployment"

      - name: Notify production team
        if: always()
        run: |
          echo "Production Release: ${{ steps.version.outputs.VERSION }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
