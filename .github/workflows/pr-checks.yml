name: PR Checks

on:
  pull_request:
    branches: [main, staging, develop]

jobs:
  security-analysis:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check if source exists
        id: check_source
        run: |
          if [ ! -f "src/**/*.csproj" ] && [ ! -f "package.json" ] && [ ! -f "src/**/*.java" ]; then
            echo "No source files found — skipping CodeQL"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Initialize CodeQL
        if: steps.check_source.outputs.skip != 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, csharp

      - name: Perform CodeQL Analysis
        if: steps.check_source.outputs.skip != 'true'
        uses: github/codeql-action/analyze@v3

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if source exists
        id: check_source
        run: |
          if [ ! -f "src/**/*.csproj" ] && [ ! -f "package.json" ]; then
            echo "No source files found — skipping tests"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        if: steps.check_source.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        if: steps.check_source.outputs.skip != 'true'
        run: dotnet restore

      - name: Build
        if: steps.check_source.outputs.skip != 'true'
        run: dotnet build --no-restore

      - name: Test
        if: steps.check_source.outputs.skip != 'true'
        run: dotnet test --no-build --verbosity normal

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ ! -f "src/**/Dockerfile" ] && [ ! -f "**/Dockerfile" ]; then
            echo "No Dockerfile found — skipping build"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        if: steps.check_dockerfile.outputs.skip != 'true'
        run: docker compose build

      - name: Trivy Scan
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: aquasec/trivy-action@master
        with:
          image-ref: "portal-shell:latest"
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: zricethezav/gitleaks@v9
        with:
          args: --verbose --exit-once