name: PR Checks

on:
  pull_request:
    branches: [main, staging, develop]

jobs:
  security-analysis:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if source exists
        id: check_source
        run: |
          if [ ! -f "src/modules/Auth/Modules.Auth.csproj" ] && [ ! -f "src/portal-shell/package.json" ]; then
            echo "No source files found — skipping CodeQL"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Initialize CodeQL
        if: steps.check_source.outputs.skip != 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, csharp

      - name: Perform CodeQL Analysis
        if: steps.check_source.outputs.skip != 'true'
        uses: github/codeql-action/analyze@v3

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if source exists
        id: check_source
        run: |
          if [ ! -f "src/modules/Auth/Modules.Auth.csproj" ] && [ ! -f "src/portal-shell/package.json" ]; then
            echo "No source files found — skipping tests"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET
        if: steps.check_source.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        if: steps.check_source.outputs.skip != 'true'
        run: |
          for csproj in $(find src -name "*.csproj"); do
            dotnet restore "$csproj" || true
          done

      - name: Build
        if: steps.check_source.outputs.skip != 'true'
        run: |
          for csproj in $(find src -name "*.csproj"); do
            dotnet build "$csproj" --no-restore -c Release || true
          done

      - name: Test
        if: steps.check_source.outputs.skip != 'true'
        run: |
          for csproj in $(find src -name "*.csproj"); do
            dotnet test "$csproj" --no-build --verbosity normal || true
          done

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ ! -f "src/portal-shell/Dockerfile" ]; then
            echo "No Dockerfile found — skipping build"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        if: steps.check_dockerfile.outputs.skip != 'true'
        run: docker compose build portal-shell

      - name: Trivy Scan
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: aquasec/trivy-action@master
        with:
          image-ref: "portal-shell:latest"
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        if: steps.check_dockerfile.outputs.skip != 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Gitleaks
        uses: zricethezav/gitleaks@v9
        with:
          args: protego
          version: latest
