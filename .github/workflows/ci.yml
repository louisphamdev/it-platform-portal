name: CI Build

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check if source exists
        id: check_source
        run: |
          csprojs=$(find src -name "*.csproj" 2>/dev/null | head -5)
          has_csproj=false
          for f in $csprojs; do [ -f "$f" ] && has_csproj=true && break; done
          has_npm=false
          [ -f "src/portal-shell/package.json" ] && has_npm=true
          if [ "$has_csproj" = false ] && [ "$has_npm" = false ]; then
            echo "No source files — skipping build"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          fi
          if [ "$has_npm" = true ]; then echo "has_npm=true" >> $GITHUB_OUTPUT; fi
          
      - name: Setup .NET
        if: steps.check_source.outputs.skip_build != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Setup Node.js
        if: steps.check_source.outputs.has_npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Restore .NET
        if: steps.check_source.outputs.skip_build != 'true'
        run: |
          for csproj in $(find src -name "*.csproj"); do
            dotnet restore "$csproj" || true
          done
          
      - name: Restore npm
        if: steps.check_source.outputs.has_npm == 'true'
        run: cd src/portal-shell && npm ci
          
      - name: Build .NET
        if: steps.check_source.outputs.skip_build != 'true'
        run: |
          for csproj in $(find src -name "*.csproj"); do
            dotnet build "$csproj" --no-restore -c Release || true
          done
          
      - name: Build npm
        if: steps.check_source.outputs.has_npm == 'true'
        run: cd src/portal-shell && npm run build || true
          
      - name: Test .NET
        if: steps.check_source.outputs.skip_build != 'true'
        run: |
          for csproj in $(find src -name "*.csproj"); do
            dotnet test "$csproj" --no-build || true
          done
