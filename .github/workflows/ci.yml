name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Restore dependencies
        run: |
          dotnet restore src/**/*.csproj
          npm ci
          
      - name: Build
        run: |
          dotnet build src/**/*.csproj --no-restore
          npm run build
          
      - name: Test
        run: |
          dotnet test src/**/*.csproj --no-build
          npm test
